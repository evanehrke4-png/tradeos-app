<!DOCTYPE html>
<html>
<head>
    <title>ACD Estimator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <!-- BIG LOGO -->
    <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

    <!-- TITLES -->
    <h1 class="title">ACD Estimator</h1>
    <p class="subtitle">Aluminium & Container Dynamics (Pty) Ltd</p>

    <!-- FORM -->
    <form method="POST">

        <input type="text" name="name" placeholder="Full Name" required>
        <input type="text" name="phone" placeholder="Phone Number" required>
        <input type="text" name="area" placeholder="Area" required>

        <select name="product" required>
            <option value="">Select Product</option>
            <option>Aluminium Window</option>
            <option>Aluminium Door</option>
            <option>Sliding Door</option>
            <option>Stacking Door</option>
        </select>

        <select name="colour" required>
            <option value="">Select Colour</option>
            <option>Black</option>
            <option>White</option>
            <option>Bronze</option>
            <option>Charcoal</option>
        </select>

        <input type="number" name="width" placeholder="Width (mm)" required>
        <input type="number" name="height" placeholder="Height (mm)" required>
        <input type="number" name="qty" placeholder="Quantity" required>

        <button type="submit">Get Estimate</button>

    </form>

</div>

</body>
</html>
