<!DOCTYPE html>
<html>
<head>
    <title>ACD Estimator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
            text-align: center;
        }

        .container {
            max-width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        img {
            max-width: 150px;
            margin-bottom: 10px;
        }

        h2 {
            margin: 10px 0;
        }

        select, input, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background: black;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .result {
            margin-top: 15px;
            padding: 15px;
            background: #fafafa;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <img src="logo.png" alt="ACD Logo">

    <h2>ACD Aluminium & Glass Estimator</h2>

    <select id="product">
        <option value="single">Single Hinge Door</option>
        <option value="double">Double Hinge Door</option>
        <option value="pivot">Pivot Door</option>
        <option value="fold3">Folding Door (3 Leaf)</option>
        <option value="fold5">Folding Door (5 Leaf)</option>
        <option value="fold7">Folding Door (7 Leaf)</option>
        <option value="sliderHeavy">Sliding Door (Heavy Duty)</option>
        <option value="sliderLight">Sliding Door (Light Duty)</option>
        <option value="topHung">Top Hung Window</option>
        <option value="sideHung">Side Hung Window</option>
        <option value="slidingWindow">Sliding Window</option>
        <option value="foldWindow">Folding Window</option>
        <option value="fixed">Fixed Panel / Shopfront</option>
    </select>

    <input type="number" id="width" placeholder="Width (meters)" step="0.01">
    <input type="number" id="height" placeholder="Height (meters)" step="0.01">

    <select id="colour">
        <option value="Bronze">Bronze</option>
        <option value="Black">Black</option>
        <option value="Charcoal">Charcoal</option>
        <option value="White">White</option>
        <option value="Natural">Natural (+15%)</option>
    </select>

    <button onclick="calculate()">Get Estimate</button>

    <div class="result" id="result"></div>

</div>

<script>

const pricing = {
    single: [3200, 4200],
    double: [3600, 4000],
    pivot: [3400, 4200],
    fold3: [2800, 3600],
    fold5: [2800, 3800],
    fold7: [2900, 3900],
    sliderHeavy: [2800, 3800],
    sliderLight: [2200, 3000],
    topHung: [1400, 3000],
    sideHung: [1800, 2600],
    slidingWindow: [1700, 2600],
    foldWindow: [3000, 4500],
    fixed: [3000, 4500]
};

const productNames = {
    single: "Single Hinge Door",
    double: "Double Hinge Door",
    pivot: "Pivot Door",
    fold3: "Folding Door (3 Leaf)",
    fold5: "Folding Door (5 Leaf)",
    fold7: "Folding Door (7 Leaf)",
    sliderHeavy: "Sliding Door (Heavy Duty)",
    sliderLight: "Sliding Door (Light Duty)",
    topHung: "Top Hung Window",
    sideHung: "Side Hung Window",
    slidingWindow: "Sliding Window",
    foldWindow: "Folding Window",
    fixed: "Fixed Panel / Shopfront"
};

function calculate() {
    let product = document.getElementById("product").value;
    let width = parseFloat(document.getElementById("width").value);
    let height = parseFloat(document.getElementById("height").value);
    let colour = document.getElementById("colour").value;

    if (!width || !height) {
        alert("Enter width and height");
        return;
    }

    let sqm = width * height;

    let minRate = pricing[product][0];
    let maxRate = pricing[product][1];

    let minPrice = sqm * minRate;
    let maxPrice = sqm * maxRate;

    // Natural colour increase
    if (colour.toLowerCase() === "natural") {
        minPrice *= 1.15;
        maxPrice *= 1.15;
    }

    document.getElementById("result").innerHTML = `
        <strong>${productNames[product]}</strong><br><br>
        Size: ${width}m × ${height}m<br>
        Area: ${sqm.toFixed(2)} m²<br>
        Colour: ${colour}<br><br>

        <strong>Estimate:</strong><br>
        R ${minPrice.toFixed(0)} - R ${maxPrice.toFixed(0)}<br><br>

        <small>Includes installation & hardware. Excludes VAT.</small>
    `;
}

</script>

</body>
</html>
