<!DOCTYPE html>
<html>
<head>
    <title>ACD Estimator</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        input, select, button { padding: 8px; margin: 5px; width: 200px; }
        .result { margin-top: 20px; padding: 15px; border: 1px solid #ccc; }
    </style>
</head>

<body>

<h2>ACD Aluminium & Glass Estimator</h2>

<label>Product:</label><br>
<select id="product">
    <option value="single">Single Hinge Door</option>
    <option value="double">Double Hinge Door</option>
    <option value="pivot">Pivot Door</option>
    <option value="fold3">Folding Door (3 Leaf)</option>
    <option value="fold5">Folding Door (5 Leaf)</option>
    <option value="fold7">Folding Door (7 Leaf)</option>
    <option value="sliderHeavy">Sliding Door (Heavy Duty)</option>
    <option value="sliderLight">Sliding Door (Light Duty)</option>
    <option value="topHung">Top Hung Window</option>
    <option value="sideHung">Side Hung Window</option>
    <option value="slidingWindow">Sliding Window</option>
    <option value="foldWindow">Folding Window</option>
    <option value="fixed">Fixed Panel / Shopfront</option>
</select><br>

<label>Width (meters):</label><br>
<input type="number" id="width" step="0.01"><br>

<label>Height (meters):</label><br>
<input type="number" id="height" step="0.01"><br>

<label>Colour:</label><br>
<select id="colour">
    <option value="Bronze">Bronze</option>
    <option value="Black">Black</option>
    <option value="Charcoal">Charcoal</option>
    <option value="White">White</option>
    <option value="Natural">Natural</option>
</select><br>

<button onclick="calculate()">Get Estimate</button>

<div class="result" id="result"></div>

<script>

const pricing = {
    single: [3200, 4200],
    double: [3600, 4000],
    pivot: [3400, 4200],
    fold3: [2800, 3600],
    fold5: [2800, 3800],
    fold7: [2900, 3900],
    sliderHeavy: [2800, 3800],
    sliderLight: [2200, 3000],
    topHung: [1400, 3000],
    sideHung: [1800, 2600],
    slidingWindow: [1700, 2600],
    foldWindow: [3000, 4500],
    fixed: [3000, 4500]
};

const productNames = {
    single: "Single Hinge Door",
    double: "Double Hinge Door",
    pivot: "Pivot Door",
    fold3: "Folding Door (3 Leaf)",
    fold5: "Folding Door (5 Leaf)",
    fold7: "Folding Door (7 Leaf)",
    sliderHeavy: "Sliding Door (Heavy Duty)",
    sliderLight: "Sliding Door (Light Duty)",
    topHung: "Top Hung Window",
    sideHung: "Side Hung Window",
    slidingWindow: "Sliding Window",
    foldWindow: "Folding Window",
    fixed: "Fixed Panel / Shopfront"
};

function calculate() {
    let product = document.getElementById("product").value;
    let width = parseFloat(document.getElementById("width").value);
    let height = parseFloat(document.getElementById("height").value);
    let colour = document.getElementById("colour").value;

    if (!width || !height) {
        alert("Please enter width and height");
        return;
    }

    let sqm = width * height;

    let minRate = pricing[product][0];
    let maxRate = pricing[product][1];

    let minPrice = sqm * minRate;
    let maxPrice = sqm * maxRate;

    // Apply Natural colour increase
    if (colour.toLowerCase() === "natural") {
        minPrice *= 1.15;
        maxPrice *= 1.15;
    }

    document.getElementById("result").innerHTML = `
        <h3>Estimate</h3>
        <p><strong>Product:</strong> ${productNames[product]}</p>
        <p><strong>Size:</strong> ${width}m × ${height}m</p>
        <p><strong>Area:</strong> ${sqm.toFixed(2)} m²</p>
        <p><strong>Colour:</strong> ${colour}</p>
        <hr>
        <p><strong>Estimated Price Range:</strong></p>
        <p>R ${minPrice.toFixed(2)} - R ${maxPrice.toFixed(2)}</p>
        <small>Includes installation & standard hardware. Excludes VAT.</small>
    `;
}

</script>

</body>
</html>
