<!DOCTYPE html>
<html>
<head>
    <title>ACD Estimator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

    <h1>ACD Estimator</h1>
    <p class="subtitle">Aluminium & Container Dynamics (Pty) Ltd</p>

    <div class="card">

        <form method="POST">

            <div id="items">

                <!-- ITEM BLOCK -->
                <div class="item">

                    <!-- PRODUCT -->
                    <label>Product Type</label>
                    <select name="product[]">

                        <optgroup label="Aluminium Windows">
                            <option>Casement Top Hung</option>
                            <option>Casement Side Hung</option>
                            <option>Sliding Windows</option>
                            <option>Folding Stacking Windows</option>
                        </optgroup>

                        <optgroup label="Aluminium Doors">
                            <option>Pivot Doors</option>
                            <option>Single Hinge Doors</option>
                            <option>Double Hinge Doors</option>
                            <option>Sliding Doors</option>
                            <option>Heavy Duty Slider</option>
                            <option>Light Duty Slider</option>
                            <option>Folding Stacking Doors</option>
                            <option>3 Leaf Folding</option>
                            <option>5 Leaf Folding</option>
                            <option>7 Leaf Folding</option>
                        </optgroup>

                        <optgroup label="Fixed Panels / Shopfronts">
                            <option>Fixed Panels / Shopfronts</option>
                        </optgroup>

                    </select>

                    <!-- COLOUR -->
                    <label>Aluminium Extrusion Colours</label>
                    <select name="colour[]">
                        <option>Natural</option>
                        <option>White</option>
                        <option>Black</option>
                        <option>Charcoal</option>
                        <option>Bronze</option>
                    </select>

                    <!-- DIMENSIONS -->
                    <label>Width (mm)</label>
                    <input type="number" name="width[]">

                    <label>Height (mm)</label>
                    <input type="number" name="height[]">

                    <label>Quantity</label>
                    <input type="number" name="qty[]" value="1">

                </div>

            </div>

            <button type="button" class="add-btn" onclick="addItem()">+ Add Another Item</button>

            <!-- CUSTOMER -->
            <label>Your Name</label>
            <input type="text" name="name">

            <label>Phone Number</label>
            <input type="text" name="phone">

            <label>Your Area</label>
            <input type="text" name="area">

            <button type="submit" class="main-btn">Get Estimate</button>

        </form>

    </div>

</div>

<script>
function addItem() {
    let item = document.querySelector('.item');
    let clone = item.cloneNode(true);
    document.getElementById('items').appendChild(clone);
}
</script>

</body>
</html>
